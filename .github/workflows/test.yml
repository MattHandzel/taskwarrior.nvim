name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Python / CLI tests ──────────────────────────────────────────────────────
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Install Taskwarrior
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y taskwarrior

      - name: Run Python tests
        run: python3 -m pytest tests/ -q

  # ── Lua / Neovim tests ──────────────────────────────────────────────────────
  lua-tests:
    name: Lua tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run Lua test suite
        run: ./tests/lua/bootstrap.sh
